<ng-template #menu>
  <div class="example-menu" cdkMenu>
    <button class="example-menu-item" cdkMenuItem (click)="activeButtonClick()">Active</button>
    <button class="example-menu-item" cdkMenuItem (click)="actionNeededButtonClick()">Action Needed</button>
    <button class="example-menu-item" cdkMenuItem (click)="onHoldButtonClick()">On Hold</button>
    <button class="example-menu-item" cdkMenuItem (click)="completedButtonClick()">Completed</button>
    <button class="example-menu-item" cdkMenuItem (click)="deletedButtonClick()">Delete</button>
    <button class="example-menu-item" cdkMenuItem (click)="editButtonClick()">Edit Task</button>
  </div>
</ng-template>
<ng-template #columnMenu let-item="item">
  <div class="example-menu" cdkMenu>
    <button class="example-menu-item" cdkMenuItem (click)="deletedMenuButtonClick(item)">Delete</button>
  </div>
</ng-template>

<div class="container-fluid" style="height: 100vh; width: 100vw;" (contextmenu)="onGanttContextMenu($event)" *ngIf="showComponent">
  <div class="row">
    <div class="col-md-4 col-12">
      <h6>Project Filter</h6>
      <ng-select [items]="statusFilters"
                 bindLabel="label"
                 bindValue="value"
                 [multiple]="false"
                 (change)="onFilterChangeStatus()"
                 searchPlaceholder="Select Status"
                 [(ngModel)]="statusFilter">
      </ng-select>
    </div>
    <div class="col-md-4 col-12">
      <h6>Foreman Filter</h6>
      <ng-select [items]="foremanFilters"
                 bindLabel="label"
                 bindValue="value"
                 [multiple]="false"
                 (change)="onFilterChangeStatus()"
                 searchPlaceholder="Select Foreman"
                 [(ngModel)]="foremanFilter">
      </ng-select>
    </div>
    <div class="col-md-4 col-12 d-flex">
      <button (click)="expandAllGroups()" class="align-self-center mr-1">
        {{ expanded ? 'Collapse' : 'Expand' }}
      </button>
      <button (click)="addTask()" class="align-self-center mr-1">
        {{ 'Add Task' }}
      </button>
      <button (click)="generatePDF()" class="align-self-center">Download as PDF</button>
    </div>
  </div>

  <div id="gantt-container" class="row mt-3" style="height: calc(100vh - 150px);">
    <div class="col-12" style="overflow: auto;">
      <ngx-gantt
        #gantt
        [groups]="groups"
        [items]="items"
        [viewType]="viewType"
        [draggable]="true"
        [async]="true"
        [childrenResolve]="childrenResolve"
        [viewOptions]="viewOptions"
        [styles]="options.styles"
        (contextmenu)="onGanttContextMenu($event)"
        (barClick)="barClick($event)"
        (dragEnded)="dragEnded($event)"
      >
        <ngx-gantt-table>
          <ngx-gantt-column name="Active Projects" width="340px">
            <ng-template #header let-item="item">
              <span class="col-header">Active Projects</span>
            </ng-template>
            <ng-template #cell let-item="item">
              <span class="col-cell" [cdkMenuTriggerFor]="columnMenu" [cdkMenuTriggerData]="{ item: item }" style="cursor: pointer;">
                {{ item.title }}
              </span>
            </ng-template>
          </ngx-gantt-column>
          <ngx-gantt-column name="Foremen" width="300px">
            <ng-template #header let-item="item">
              <span class="col-header">Foreman</span>
            </ng-template>
            <ng-template #cell let-item="item">
              <span class="col-cell" [cdkMenuTriggerFor]="columnMenu" [cdkMenuTriggerData]="{ item: item }" style="cursor: pointer;">
                {{ getManagerName(item.id) }}
              </span>
            </ng-template>
          </ngx-gantt-column>
        </ngx-gantt-table>

        <ng-template #group let-group="group" let-items="items">
          <span class="group-title">{{ group.title }}</span>
        </ng-template>
        <ng-template #bar let-item="item">
          <span
            *ngIf="!item.isHoliday; else noMenu"
            [cdkMenuTriggerFor]="menu"
            [ngStyle]="{
              'font-size': '26px',
              'font-weight': '600',
              'color': '#000',
              'display': 'flex',
              'align-items': 'center',
              'justify-content': 'center',
              'width': '100%',
              'height': '100%',
              'overflow': 'hidden',
              'white-space': 'nowrap',
              'text-overflow': 'ellipsis'
            }"
            style="cursor: pointer;">
            {{ item.title }}
          </span>
          <ng-template #noMenu>
            <span [ngStyle]="{
              'font-size': '26px',
              'font-weight': '600',
              'color': '#000',
              'display': 'flex',
              'align-items': 'center',
              'justify-content': 'center',
              'width': '100%',
              'height': '100%',
              'overflow': 'hidden',
              'white-space': 'nowrap',
              'text-overflow': 'ellipsis'
            }">{{ item.title }}</span>
          </ng-template>
        </ng-template>

      </ngx-gantt>
    </div>
  </div>
</div>
