<div class="row">
    <div class="col">
      <div class="card">
        <div class="card-header">
          <span class="text-uppercase">Add a Task</span>
        </div>
        <div class="card-body widget-body">
          <!-- Inputs at the top -->
          <div class="row py-4">
            <div class="col-md-6">
              <h6>Select Project</h6>
              <ng-select [items]="groups" 
                         bindLabel="title" 
                         bindValue="id" 
                         [multiple]="false"
                         searchPlaceholder="Select Project"
                         [(ngModel)]="selectedProject">
              </ng-select>
            </div>
            <div class="col-md-6">
              <h6>Select Task</h6>
              <ng-select [items]="availableTasks" 
                         bindLabel="label" 
                         bindValue="value" 
                         [multiple]="false"
                         searchPlaceholder="Select Task"
                         [(ngModel)]="selectedTask"
                         (ngModelChange)="onTaskChange($event)"
                         [ngClass]="{'is-invalid': !selectedTask && isFormSubmitted}">
              </ng-select>
            </div>
          </div>
          <div class="row mt-3">
            <!-- Date-time picker and buttons at the bottom -->
            <div class="col-md-6">
              <h6>Select Start and End Time</h6>
              <form [formGroup]="taskrange">
                <mat-form-field>
                  <mat-label>Enter a date range</mat-label>
                  <mat-date-range-input [formGroup]="taskrange" [rangePicker]="picker">
                    <input matStartDate formControlName="start" placeholder="Start date">
                    <input matEndDate formControlName="end" placeholder="End date">
                  </mat-date-range-input>
                  <mat-hint>MM/DD/YYYY – MM/DD/YYYY</mat-hint>
                  <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                  <mat-date-range-picker #picker></mat-date-range-picker>
                </mat-form-field>
              </form>
            </div>
            <div class="col-md-6">
              <button (click)="cancel()" class="custom-button btn-sm mr-2" style="margin-bottom: 8px;">Cancel</button>
              <button (click)="submit()" [disabled]="!isFormValid || !isTaskValid || isLoading" class="custom-button btn-sm">
                <span *ngIf="isLoading" class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Submit
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
