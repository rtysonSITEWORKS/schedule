<div class="create-dialog">
  <div class="dialog-header"><span>Edit Task</span></div>
  <div class="dialog-body">

    <div class="field-pair">
      <div class="field-row">
        <label>Foreman</label>
        <ng-select [items]="foremanFilters"
                   bindLabel="label"
                   bindValue="value"
                   [multiple]="false"
                   placeholder="Select foreman"
                   [(ngModel)]="selectedForeman"
                   [disabled]="saving">
        </ng-select>
      </div>
      <div class="field-row"><!-- spacer --></div>
    </div>

    <div class="field-pair">
      <div class="field-row">
        <label>Start Date *</label>
        <input type="date" [(ngModel)]="startDate" class="form-input" [disabled]="saving">
      </div>
      <div class="field-row">
        <label>End Date *</label>
        <input type="date" [(ngModel)]="endDate" class="form-input" [disabled]="saving">
      </div>
    </div>

    <div class="dialog-actions">
      <button class="btn-cancel" (click)="cancel()" [disabled]="saving">Cancel</button>
      <button class="btn-submit" (click)="submit()"
              [disabled]="saving || !startDate || !endDate">
        {{ saving ? 'Saving…' : 'Save Changes' }}
      </button>
    </div>
  </div>
</div>
