<div class="create-dialog">
  <div class="dialog-header"><span>Add Task</span></div>
  <div class="dialog-body">

    <div class="field-pair">
      <div class="field-row">
        <label>Project *</label>
        <ng-select [items]="groups"
                   bindLabel="title"
                   bindValue="id"
                   [multiple]="false"
                   placeholder="Select project"
                   [(ngModel)]="selectedProject"
                   [disabled]="isLoading">
        </ng-select>
      </div>
      <div class="field-row">
        <label>Task *</label>
        <ng-select [items]="availableTasks"
                   bindLabel="label"
                   bindValue="value"
                   [multiple]="false"
                   placeholder="Select task"
                   [(ngModel)]="selectedTask"
                   [disabled]="isLoading">
        </ng-select>
      </div>
    </div>

    <div class="field-pair">
      <div class="field-row">
        <label>Start Date *</label>
        <input type="date" [(ngModel)]="startDate" class="form-input" [disabled]="isLoading">
      </div>
      <div class="field-row">
        <label>End Date *</label>
        <input type="date" [(ngModel)]="endDate" class="form-input" [disabled]="isLoading">
      </div>
    </div>

    <div class="dialog-actions">
      <button class="btn-cancel" (click)="cancel()" [disabled]="isLoading">Cancel</button>
      <button class="btn-submit" (click)="submit()"
              [disabled]="isLoading || !selectedProject || !selectedTask || !startDate || !endDate">
        {{ isLoading ? 'Creating…' : 'Add Task' }}
      </button>
    </div>
  </div>
</div>
