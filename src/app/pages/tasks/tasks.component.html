<div class="app-toolbar">
  <div class="tb-section tb-section-brand">
    <img class="tb-logo" src="assets/img/logo/siteworks-full.png" alt="SiteWorks">
  </div>
  <div class="tb-sep"></div>
  <div class="tb-section tb-section-nav">
    <a class="tb-nav-link" routerLink="/pages/dashboard" routerLinkActive="tb-nav-link--active">
      <i class="fa fa-calendar"></i> Schedule
    </a>
    <a class="tb-nav-link" routerLink="/pages/users" routerLinkActive="tb-nav-link--active">
      <i class="fa fa-users"></i> Users
    </a>
    <a class="tb-nav-link" routerLink="/pages/projects" routerLinkActive="tb-nav-link--active">
      <i class="fa fa-folder-open"></i> Projects
    </a>
    <a class="tb-nav-link" routerLink="/pages/tasks" routerLinkActive="tb-nav-link--active">
      <i class="fa fa-list"></i> Tasks
    </a>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-section">
    <span class="tb-page-title">Task Templates</span>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-section">
    <div class="tb-filter-group">
      <span class="tb-filter-label">Search</span>
      <input class="tb-search"
             [(ngModel)]="searchTerm"
             (ngModelChange)="onSearch()"
             placeholder="Filter tasks…">
    </div>
  </div>
  <div class="tb-sep"></div>
  <div class="tb-section">
    <div class="tb-filter-group">
      <span class="tb-filter-label">New</span>
      <input class="tb-search"
             [(ngModel)]="newTaskName"
             placeholder="Task name…"
             (keydown.enter)="add()"
             [disabled]="saving"
             style="width:200px">
    </div>
    <div class="tb-actions" style="margin-left:8px">
      <button class="tb-btn tb-btn-accent"
              (click)="add()"
              [disabled]="saving || !newTaskName.trim()">
        {{ saving ? 'Adding…' : '+ Add' }}
      </button>
    </div>
  </div>
</div>

<div class="page-body">
  <ngx-datatable
    #table
    class="bootstrap material"
    [headerHeight]="44"
    [footerHeight]="44"
    [rowHeight]="48"
    [limit]="25"
    [columnMode]="'force'"
    [rows]="rows"
    [loadingIndicator]="loading">

    <ngx-datatable-column name="Task Name" prop="task" [sortable]="true"></ngx-datatable-column>

    <ngx-datatable-column name="Category" prop="type" [sortable]="true" [maxWidth]="200">
      <ng-template ngx-datatable-cell-template let-value="value">
        {{ value || '—' }}
      </ng-template>
    </ngx-datatable-column>

    <ngx-datatable-column name="" [sortable]="false" [maxWidth]="80" [resizeable]="false">
      <ng-template ngx-datatable-cell-template let-row="row">
        <div class="row-actions">
          <button class="action-btn del-btn" (click)="deleteRow(row)" title="Delete">✕</button>
        </div>
      </ng-template>
    </ngx-datatable-column>

  </ngx-datatable>
</div>
